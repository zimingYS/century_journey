version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: monthly
      time: "09:00"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 2
    groups:
      cargo-dependencies:
        patterns:
          - "*"
    labels:
      - dependencies
      - rust
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
      time: "09:00"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 1
    groups:
      github-actions:
        patterns:
          - "*"
    labels:
      - dependencies
      - github-actions
