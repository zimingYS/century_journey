name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
    - name: Check
      run: cargo check --verbose
    - name: Format
      run: cargo fmt --check
    - name: Clippy
      run: cargo clippy --all-targets --all-features
    - name: Test
      run: cargo test --verbose
