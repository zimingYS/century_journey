name: Build Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  APP_NAME: century_journey

jobs:
  quality:
    name: Quality
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Check
        run: cargo check --locked --all-targets --all-features --verbose

      - name: Format
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test --locked --verbose

      - name: Validate content
        run: cargo run --locked -- --check-content assets

  build-windows:
    name: Windows
    needs: quality
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --release --locked

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release

          Copy-Item target/release/${env:APP_NAME}.exe release/

          if (Test-Path assets) {
              Copy-Item assets release/assets -Recurse
          }

          Copy-Item LICENSE.md release/
          Copy-Item README.md release/
          Copy-Item LICENSES release/LICENSES -Recurse

          Compress-Archive `
              -Path release/* `
              -DestinationPath ${env:APP_NAME}-Windows.zip

      - name: Upload Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            century_journey-Windows.zip

